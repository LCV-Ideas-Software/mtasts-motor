name: Deploy
on:
  push:
    branches: [main]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: "--no-deprecation"
concurrency:
  group: deploy-main
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy application
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions: write-all
    environment: cloudflare-production
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./package-lock.json
      - name: Install and verify latest Wrangler
        id: wrangler
        shell: bash
        run: | # zizmor: ignore[adhoc-packages] Wrangler latest is an explicit organization policy; signatures are verified below.
          set -euo pipefail
          wrangler_prefix="$RUNNER_TEMP/wrangler-latest"
          npm install --prefix "$wrangler_prefix" --save-exact --ignore-scripts --no-audit --no-fund --registry=https://registry.npmjs.org/ wrangler@latest
          npm audit signatures --prefix "$wrangler_prefix" --registry=https://registry.npmjs.org/

          WRANGLER_BIN="$wrangler_prefix/node_modules/.bin/wrangler"
          if [ ! -x "$WRANGLER_BIN" ]; then
            echo "::error::The isolated Wrangler executable was not created." >&2
            exit 1
          fi
          WRANGLER_VERSION="$("$WRANGLER_BIN" --version)"
          if ! [[ "$WRANGLER_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Unexpected Wrangler version: $WRANGLER_VERSION" >&2
            exit 1
          fi

          printf 'Resolved Wrangler version: %s\n' "$WRANGLER_VERSION"
          printf 'bin=%s\nversion=%s\n' "$WRANGLER_BIN" "$WRANGLER_VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: npm ci
      - name: Security audit
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org/
      - name: Lint
        run: npm run lint
      - name: Biome (lint + format)
        run: npm run biome
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Inject D1 database_id from secret
        run: |
          if [ -z "${D1_DATABASE_ID:-}" ]; then
            echo "::error::D1_DATABASE_ID secret is not set" >&2
            exit 1
          fi
          # Deterministic JSON mutation: only `.d1_databases[0].database_id` is touched.
          # Avoids regex pitfalls of sed (escape, multi-occurrence) per peer review (Gemini, session b8a27611).
          jq --arg id "$D1_DATABASE_ID" '.d1_databases[0].database_id = $id' wrangler.json > wrangler.json.tmp
          mv wrangler.json.tmp wrangler.json
          # Post-mutation verification
          grep -q "$D1_DATABASE_ID" wrangler.json || { echo "::error::Substitution failed: real ID not in file" >&2; exit 1; }
          if grep -q "00000000-0000-0000-0000-000000000000" wrangler.json; then
            echo "::error::Placeholder still present after mutation" >&2
            exit 1
          fi
        env:
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      - name: Deploy Worker
        run: |
          "$WRANGLER_BIN" deploy --strict
        env:
          WRANGLER_BIN: ${{ steps.wrangler.outputs.bin }}
          CLOUDFLARE_API_TOKEN: ${{ secrets['CLOUDFLARE_API_TOKEN'] }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets['CLOUDFLARE_ACCOUNT_ID'] }}
    timeout-minutes: 30
permissions: write-all
